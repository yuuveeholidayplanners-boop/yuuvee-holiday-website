<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yuuvee Holiday Planners</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f5f7fb;
      color: #0f172a;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(3, 21, 51, 0.96);
      backdrop-filter: blur(14px);
      padding: 14px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand img {
      height: 74px;
      width: auto;
      object-fit: contain;
      background: #ffffff;
      border-radius: 18px;
      padding: 8px 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand-name {
      color: #fff;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.3px;
      line-height: 1.1;
    }

    .brand-tagline {
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 500;
      margin-top: 4px;
      letter-spacing: 0.4px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .nav-links a {
      color: white;
      font-size: 16px;
      font-weight: 700;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #38bdf8;
    }

    .nav-enquire {
      background: linear-gradient(135deg, #facc15, #f59e0b);
      color: #111827 !important;
      padding: 12px 22px;
      border-radius: 999px;
      font-weight: 800 !important;
      box-shadow: 0 10px 22px rgba(250, 204, 21, 0.25);
    }

    .nav-enquire:hover {
      transform: translateY(-2px);
      color: #111827 !important;
    }

    /* HERO */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 180px 20px 100px;
      overflow: hidden;
      color: white;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1800&q=80") center/cover no-repeat;
      animation: zoomBg 20s ease-in-out infinite alternate;
      z-index: 0;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(3, 21, 51, 0.50), rgba(3, 21, 51, 0.68));
      z-index: 1;
    }

    @keyframes zoomBg {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      animation: fadeUp 1.1s ease;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(255,255,255,0.14);
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .hero h1 {
      font-size: clamp(42px, 7vw, 82px);
      font-weight: 900;
      line-height: 1.08;
      margin-bottom: 18px;
      text-shadow: 0 8px 28px rgba(0,0,0,0.28);
    }

    .hero-script {
      font-family: 'Playfair Display', serif;
      font-size: clamp(26px, 4vw, 40px);
      color: #facc15;
      margin-bottom: 14px;
      font-style: italic;
    }

    .hero p {
      font-size: clamp(17px, 2.2vw, 22px);
      color: #e2e8f0;
      max-width: 860px;
      margin: 0 auto 34px;
      line-height: 1.7;
      font-weight: 500;
    }

    .hero-buttons {
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 34px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 800;
      transition: all 0.3s ease;
      display: inline-block;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: white;
      box-shadow: 0 12px 28px rgba(14,165,233,0.28);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.14);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.22);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(35px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* SECTION */
    .section {
      padding: 90px 6% 70px;
    }

    .section-title {
      text-align: center;
      font-size: clamp(34px, 5vw, 58px);
      font-weight: 900;
      color: #031533;
      margin-bottom: 18px;
      letter-spacing: -1px;
    }

    .section-subtitle {
      text-align: center;
      color: #475569;
      max-width: 760px;
      margin: 0 auto 44px;
      font-size: 17px;
      line-height: 1.8;
    }

    /* CARDS */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 30px;
      align-items: stretch;
    }

    .card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.10);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 22px 46px rgba(15, 23, 42, 0.16);
    }

    .card-image {
      height: 250px;
      width: 100%;
      overflow: hidden;
      background: #e2e8f0;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .card:hover .card-image img {
      transform: scale(1.08);
    }

    .card-title {
      background: linear-gradient(135deg, #0f3d91, #1d4ed8);
      color: white;
      text-align: center;
      padding: 24px 18px;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    /* SERVICES */
    .services-section {
      background: linear-gradient(180deg, #f8fbff, #eef5ff);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 26px;
      margin-top: 20px;
    }

    .service-card {
      background: white;
      border-radius: 26px;
      padding: 32px 26px;
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
      text-align: center;
      transition: 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-8px);
    }

    .service-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .service-card h3 {
      font-size: 22px;
      margin-bottom: 12px;
      color: #031533;
      font-weight: 800;
    }

    .service-card p {
      color: #475569;
      line-height: 1.8;
      font-size: 15px;
    }

    /* CONTACT */
    .contact-section {
      background: linear-gradient(135deg, #031533, #05285f);
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .contact-section::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(56,189,248,0.12), transparent 30%);
      pointer-events: none;
    }

    .contact-content {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin: auto;
    }

    .contact-title {
      font-size: clamp(34px, 5vw, 58px);
      font-weight: 900;
      margin-bottom: 24px;
    }

    .contact-details {
      font-size: 19px;
      line-height: 2.2;
      color: #f8fafc;
      font-weight: 600;
    }

    .contact-details a {
      color: #38bdf8;
      font-weight: 800;
    }

    .contact-buttons {
      margin-top: 34px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      box-shadow: 0 12px 28px rgba(34,197,94,0.28);
    }

    .btn-call {
      background: white;
      color: #0f3d91;
      box-shadow: 0 12px 28px rgba(255,255,255,0.12);
    }

    .btn-call:hover,
    .btn-whatsapp:hover {
      transform: translateY(-3px);
    }

    /* FOOTER */
    footer {
      background: #010b1d;
      color: #cbd5e1;
      text-align: center;
      padding: 22px 10px;
      font-size: 15px;
      font-weight: 500;
    }

    /* POPUP */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.72);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    .popup-box {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.28);
      animation: popupFade 0.35s ease;
    }

    @keyframes popupFade {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .popup-header {
      background: linear-gradient(135deg, #0f3d91, #1d4ed8);
      color: white;
      padding: 22px 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .popup-header h2 {
      font-size: 24px;
      font-weight: 800;
    }

    .close-btn {
      background: rgba(255,255,255,0.15);
      color: white;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      font-weight: 700;
    }

    .popup-body {
      padding: 28px
